<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Florè Admin — Ordini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand" aria-label="Florè home">
        <img src="logo-flore.svg" alt="Florè" class="brand-logo" />
      </a>
      <div class="header-actions">
        <a class="ghost-link" href="index.html">Torna al sito</a>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container admin-wrap">
      <div class="section-head">
        <div>
          <p class="eyebrow">Admin</p>
          <h2>Gestione ordini</h2>
          <p class="section-copy">Accedi con email e password Supabase per vedere gli ordini.</p>
        </div>
      </div>

      <div class="admin-grid">
        <section class="checkout-card">
          <h3 class="admin-title">Login admin</h3>
          <form id="adminLoginForm" class="form-grid admin-form">
            <div class="field full">
              <label for="adminEmail">Email</label>
              <input type="email" id="adminEmail" placeholder="admin@email.com" required>
            </div>
            <div class="field full">
              <label for="adminPassword">Password</label>
              <input type="password" id="adminPassword" placeholder="••••••••" required>
            </div>
            <div class="field full">
              <button class="btn btn-primary btn-block" type="submit">Accedi</button>
            </div>
          </form>

          <div class="admin-actions-row">
            <button class="btn btn-secondary" id="adminRefreshBtn" type="button">Aggiorna ordini</button>
            <button class="btn btn-secondary" id="adminLogoutBtn" type="button">Logout</button>
          </div>
          <p id="adminStatus" class="section-copy">Non autenticato.</p>
        </section>

        <section class="summary-card">
          <h3 class="admin-title">Ordini ricevuti</h3>
          <div id="ordersList" class="orders-list">
            <p class="empty-message">Effettua il login per vedere gli ordini.</p>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="admin.js"></script>
</body>
</html>
